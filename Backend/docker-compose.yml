# =============================================================================
# CEMENT DJANGO - DOCKER COMPOSE (PRODUCTION)
# Usage: docker-compose -f docker-compose.yml up -d
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: clinic_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: ${DOCKER_IMAGE:-clinic_web:latest}
    container_name: clinic_web
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_ENGINE: postgres
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - static_volume:/app/staticfiles
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "HOST=$${ALLOWED_HOSTS%%,*}; [ -n \"$$HOST\" ] || HOST=localhost; curl -fsS -H \"Host: $$HOST\" http://127.0.0.1:8000/admin/login/ > /dev/null" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data_prod:
  static_volume:
