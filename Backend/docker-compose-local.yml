services:
  db:
    image: postgres:16-alpine
    container_name: clinic_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d clinic_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: clinic_web
    restart: unless-stopped
    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      DATABASE_ENGINE: postgres
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
